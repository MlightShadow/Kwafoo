fetch_days = 2

[[news_sources.rss]]
url = "http://feed.appinn.com/"
name = "小众软件"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://36kr.com/feed"
name = "36氪"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://www.ithome.com/rss/"
name = "IT之家"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://www.36kr.com/feed"
name = "36氪"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://www.yystv.cn/rss/feed"
name = "游戏研究社"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "http://blog.devtang.com/atom.xml"
name = "唐巧的博客"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://xueqiu.com/hots/topic/rss"
name = "今日话题 - 雪球"
enabled = true
fetch_days = 2

[[news_sources.web]]
url = ""
name = ""
enabled = false

[news_sources.web.selectors]
container = "div.news-list"
title = "h2.news-title"
content = "div.news-content"
link = "a.news-link"
time = "span.news-time"

[scheduler]
fetch_interval = 1800
ai_process_interval = 600
auto_fetch = false
auto_ai_process = false
auto_ai_after_fetch = false
max_fetch_workers = 20

[network]
enable_proxy = false
proxy_url = ""

[image]
enable_fetch = true
storage_mode = "filesystem"
storage_path = "data/images"

[ai]
base_url = "http://localhost:1234"
model = "nvidia/nemotron-3-nano-4b"
api_key = ""
max_tokens = 4096
temperature = 0.7
max_workers = 1
batch_size = 1
enable_summary = true
summary_threshold = 140
max_input_length = 2000
timeout = 120

[server]
host = "0.0.0.0"
port = 8000
enable_websocket = true

[rag]
top_k = 5
use_fts = true

[logging]
level = "INFO"
file = "data/logs/kwafoo.log"
max_size = 10485760
backup_count = 5

[image.thumbnail_size]
width = 128
height = 128
default_image = ""
supported_formats = [ "jpg", "jpeg", "png", "webp", "gif",]
max_image_size = 5242880

[image.display]
position = "right"  # "right" 或 "left"
show_thumbnail = true  # 是否显示缩略图

[[categories]]
name = "科技"
description = "涉及人工智能、科技产品、互联网、编程、软件、硬件等技术相关内容"
keywords = ["人工智能", "科技"]
icon = "💻"
color = "#3498db"

