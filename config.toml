enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://36kr.com/feed"
name = "36氪"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://www.ithome.com/rss/"
name = "IT之家"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://www.36kr.com/feed"
name = "36氪"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://www.yystv.cn/rss/feed"
name = "游戏研究社"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "http://blog.devtang.com/atom.xml"
name = "唐巧的博客"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://xueqiu.com/hots/topic/rss"
name = "今日话题 - 雪球"
enabled = true
fetch_days = 2

[[news_sources.web]]
url = ""
name = ""
enabled = false

[news_sources.web.selectors]
container = "div.news-list"
title = "h2.news-title"
content = "div.news-content"
link = "a.news-link"
time = "span.news-time"

[scheduler]
fetch_interval = 1800
ai_process_interval = 600
auto_fetch = false
auto_ai_process = false
auto_ai_after_fetch = false
max_fetch_workers = 20

[network]
enable_proxy = false
proxy_url = ""

[image]
enable_fetch = true
storage_mode = "filesystem"
storage_path = "data/images"

[ai]
base_url = "http://localhost:1234"
model = "nvidia/nemotron-3-nano-4b"
api_key = ""
max_tokens = 4096
temperature = 0.7
max_workers = 1
batch_size = 1
enable_summary = true
summary_threshold = 140
max_input_length = 2000
timeout = 120
enable_summary_comment = true
enable_classifier_reasoning = false
enable_summarizer_reasoning = false

[ai.comment_stance]
# 国籍示例：中国、美国、英国、日本、韩国、德国、法国、俄罗斯等
nationality = "中国"
# 性别示例：男、女、其他
gender = "男"
# 年龄
age = "30"
# 家庭状况示例：未婚、已婚、离异、丧偶
family_status = "已婚"
# 收入水平示例：低、中等、高
income = "低"
# 健康状况示例：良好、一般、较差
health_status = "良好"
# 宗教信仰示例：无、佛教、基督教、伊斯兰教、道教、天主教、犹太教等
religion = "无"
# 自定义描述（留空则使用上述配置生成）
custom_description = ""

[server]
host = "0.0.0.0"
port = 8000
enable_websocket = true

[rag]
top_k = 5
use_fts = true

[logging]
level = "INFO"
file = "data/logs/kwafoo.log"
max_size = 10485760
backup_count = 5

[image.thumbnail_size]
width = 128
height = 128
default_image = ""
supported_formats = [ "jpg", "jpeg", "png", "webp", "gif",]

[compression]
# 是否启用文本压缩
enable_compression = true
# 目标token数（默认2000，约5000字符）
target_tokens = 2000
# 压缩级别：balanced（平衡）、aggressive（激进）、conservative（保守）
compression_level = "balanced"
# 压缩算法：auto（自动选择）、default（默认算法）、textrank（textrank4zh算法）
algorithm = "auto"
# 压缩模式：summary（摘要）、keypoints（要点）、qa（问答）
mode = "summary"
max_image_size = 5242880

[image.display]
position = "right"  # "right" 或 "left"
show_thumbnail = true  # 是否显示缩略图

[[categories]]
name = "科技"
description = "涉及人工智能、科技产品、互联网、编程、软件、硬件等技术相关内容"
keywords = ["人工智能", "科技"]
icon = "💻"
color = "#3498db"

