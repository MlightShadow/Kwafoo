[database]
path = "data/kwafoo.db"

[news_sources]

[[news_sources.rss]]
url = "https://sspai.com/feed"
name = "少数派"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://36kr.com/feed"
name = "36氪"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://www.ithome.com/rss/"
name = "IT之家"
enabled = true
fetch_days = 2

[[news_sources.rss]]
url = "https://www.yystv.cn/rss/feed"
name = "游戏研究社"
enabled = true
fetch_days = 2

[[news_sources.web]]
url = ""
name = ""
enabled = false

[news_sources.web.selectors]
container = "div.news-list"
title = "h2.news-title"
content = "div.news-content"
link = "a.news-link"
time = "span.news-time"

[scheduler]
fetch_interval = 1800
ai_process_interval = 600
auto_fetch = false
auto_ai_process = false
auto_ai_after_fetch = false
max_fetch_workers = 20

[network]
enable_proxy = false
proxy_url = ""

[image]
enable_fetch = true
storage_mode = "filesystem"
storage_path = "data/images"

[ai]
base_url = "http://localhost:1234"
model = "nvidia/nemotron-3-nano-4b"
api_key = ""
max_tokens = 4096
temperature = 0.7
max_workers = 1
batch_size = 1
max_input_length = 2000
timeout = 120
enable_summary_comment = true
enable_classifier_reasoning = false
enable_summarizer_reasoning = false

# 是否启用自动AI处理（在新闻抓取成功后自动添加到AI处理队列）
auto_process = false

[ai.scoring]
# 重要性描述（用于AI判断新闻重要性）
importance_description = """
我关注以下方面的新闻：
1. 科技创新和人工智能发展
2. 财经市场动态和投资机会
3. 国际重大事件和外交关系
4. 政策变化和法规更新
5. 行业趋势和商业模式创新
"""

# AI感官分描述（用于AI判断新闻阅读价值）
ai_feeling_description = """
我喜欢的新闻类型：
1. 有深度分析和独特观点的新闻
2. 提供实用信息和解决方案的新闻
3. 有创新性和前瞻性的新闻
4. 数据详实、逻辑清晰的新闻
5. 有启发性和教育意义的新闻

我不喜欢的新闻类型：
1. 纯粹标题党、内容空洞的新闻
2. 重复陈旧、缺乏新意的新闻
3. 偏激极端、缺乏客观性的新闻
4. 广告性质明显、缺乏价值的新闻
5. 内容混乱、逻辑不清的新闻
"""

# 用户兴趣关键词（用于主题相关性评分）
interest_keywords = ["人工智能", "科技", "财经", "投资", "国际", "政策", "创新"]

# 高可信度来源列表（用于来源可信度评分）
trusted_sources = ["少数派", "36氪", "IT之家"]

# 评分维度权重
topic_relevance_weight = 0.4    # 主题相关性权重
importance_weight = 0.3          # 重要性权重
ai_feeling_weight = 0.2           # AI感官分权重
source_weight = 0.1              # 来源可信度权重

[ai.comment_stance]
# 国籍示例：中国、美国、英国、日本、韩国、德国、法国、俄罗斯等
nationality = "中国"
# 性别示例：男、女、其他
gender = "男"
# 年龄
age = "30"
# 家庭状况示例：未婚、已婚、离异、丧偶
family_status = "已婚"
# 收入水平示例：低、中等、高
income = "低"
# 健康状况示例：良好、一般、较差
health_status = "良好"
# 宗教信仰示例：无、佛教、基督教、伊斯兰教、道教、天主教、犹太教等
religion = "无"
# 自定义描述（留空则使用上述配置生成）
custom_description = ""

[server]
host = "0.0.0.0"
port = 8000
enable_websocket = true

[rag]
top_k = 5
use_fts = true

[logging]
level = "INFO"
file = "data/logs/kwafoo.log"
max_size = 10485760
backup_count = 5

[image.thumbnail_size]
width = 128
height = 128
default_image = ""
supported_formats = [ "jpg", "jpeg", "png", "webp", "gif",]

[compression]
# 是否启用文本压缩
enable_compression = true
# 目标token数（默认2000，约5000字符）
target_tokens = 2000
# 压缩级别：balanced（平衡）、aggressive（激进）、conservative（保守）
compression_level = "balanced"
# 压缩算法：auto（自动选择）、default（默认算法）、textrank（textrank4zh算法）
algorithm = "auto"
# 压缩模式：summary（摘要）、keypoints（要点）、qa（问答）
mode = "summary"
max_image_size = 5242880

[report]
# 报告配置
enable_auto_generate = false
auto_generate_types = ["daily"]
daily_generate_time = "08:00"
weekly_generate_day = "monday"
weekly_generate_time = "09:00"
monthly_generate_day = 1
monthly_generate_time = "10:00"
max_news_count = 20
# AI配置
report_ai_model = "nvidia/nemotron-3-nano-4b"
report_ai_temperature = 0.7
report_ai_timeout = 300

[content_fetch]
# 是否启用正文抓取
enable_content_fetch = true
# 提取算法：density, dom, hybrid
algorithm = "hybrid"
# 最小正文长度（字符）
min_content_length = 200
# 最大正文长度（字符，超过则压缩）
max_content_length = 10000
# 超时时间（秒）
timeout = 30
# 是否使用代理
use_proxy = true
# 是否缓存已抓取的正文
enable_cache = true

[image.display]
position = "right"  # "right" 或 "left"
show_thumbnail = true  # 是否显示缩略图

