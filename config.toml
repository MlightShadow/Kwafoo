icon = "💰"
color = "#27ae60"

[[categories]]
name = "国际"
description = "涉及国际新闻、世界大事、外交关系等国际相关内容"
keywords = ["国际", "世界", "外交"]
icon = "🌍"
color = "#e74c3c"

[[categories]]
name = "体育"
