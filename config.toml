[database]
path = "data/kwafoo.db"  # 数据库文件路径

[news_sources]  # 新闻源配置

[[news_sources.rss]]
url = "https://sspai.com/feed"  # RSS订阅地址
name = "少数派"  # 来源名称
enabled = true  # 是否启用
fetch_days = 2  # 抓取最近几天的新闻
score = 100  # 来源分，默认100

[[news_sources.rss]]
url = "https://36kr.com/feed"  # RSS订阅地址
name = "36氪"  # 来源名称
enabled = true  # 是否启用
fetch_days = 2  # 抓取最近几天的新闻
score = 100  # 来源分，默认100

[[news_sources.rss]]
url = "https://www.ithome.com/rss/"  # RSS订阅地址
name = "IT之家"  # 来源名称
enabled = true  # 是否启用
fetch_days = 2  # 抓取最近几天的新闻
score = 100  # 来源分，默认100

[[news_sources.rss]]
url = "https://www.yystv.cn/rss/feed"  # RSS订阅地址
name = "游戏研究社"  # 来源名称
enabled = true  # 是否启用
fetch_days = 2  # 抓取最近几天的新闻
score = 100  # 来源分，默认100

[[news_sources.rss]]
url = "https://api.newshacker.me/rss"  # RSS订阅地址
name = "NewsHacker"  # 来源名称
enabled = true  # 是否启用
fetch_days = 2  # 抓取最近几天的新闻
score = 100  # 来源分，默认100

[[news_sources.web]]
url = ""  # 网站首页URL
name = ""  # 网站名称
enabled = false  # 是否启用

[news_sources.web.selectors]  # 网站抓取选择器配置
container = "div.news-list"  # 新闻列表容器选择器
title = "h2.news-title"  # 标题选择器
content = "div.news-content"  # 内容选择器
link = "a.news-link"  # 链接选择器
time = "span.news-time"  # 时间选择器

[scheduler]  # 调度器配置
fetch_interval = 1800  # 自动抓取间隔（秒）
ai_process_interval = 600  # AI处理间隔（秒）
auto_fetch = false  # 是否自动抓取
auto_ai_process = false  # 是否自动AI处理
auto_ai_after_fetch = false  # 抓取后是否自动AI处理
max_fetch_workers = 20  # 最大抓取并发数

[network]  # 网络配置
enable_proxy = false  # 是否启用代理
proxy_url = ""  # 代理地址

[image]  # 图片配置
enable_fetch = true  # 是否抓取图片
storage_mode = "filesystem"  # 存储模式
storage_path = "data/images"  # 存储路径

[ai]  # AI配置
base_url = "http://localhost:1234"  # AI服务地址
model = "google/gemma-4-e4b"  # AI模型名称（必填，例如：google/gemma-4-e4b、nvidia/nemotron-3-nano-4b等）
api_key = ""  # API密钥
max_tokens = 4096  # 最大输出token数
temperature = 0.7  # 温度参数（0-1，越高越随机）
max_workers = 1  # 最大并发数
batch_size = 1  # 批处理大小
max_input_length = 2000  # 最大输入长度
timeout = 120  # 超时时间（秒）
enable_summary_comment = true  # 是否生成AI评论
enable_classifier_reasoning = false  # 分类器是否启用推理
enable_summarizer_reasoning = false  # 摘要器是否启用推理

# AI客户端配置
# 是否启用JSON格式响应
enable_json_response = true
# 是否启用响应验证
enable_response_validation = true
# 最大重试次数
max_retries = 3
# 重试延迟（秒）
retry_delay = 1.0

# 是否启用自动AI处理（在新闻抓取成功后自动添加到AI处理队列）
auto_process = false

[ai.scoring]
# 重要程度判断描述（用于AI判断事件重要性）
importance_description = """
判断新闻重要程度的标准：
1. 影响范围：全球性事件 > 国家级事件 > 地区性事件 > 局部事件
2. 影响程度：重大政策变化 > 重大技术突破 > 重要商业事件 > 一般新闻
3. 涉及人数：影响数百万人的事件 > 影响数十万人的事件 > 影响数千人的事件
4. 持续时间：长期影响 > 中期影响 > 短期影响
5. 用户相关性：直接影响用户所在国家/地区的事件 > 间接影响的事件 > 无影响的事件
"""

# 用户个人信息（用于重要程度判断）
user_nationality = "中国"  # 国籍
user_religion = "无"       # 宗教信仰

# 用户兴趣关键字（用于关联度评分，AI会分析新闻中是否命中这些关键字）
# 示例：interest_keywords = ["人工智能", "大模型", "ChatGPT", "机器学习", "深度学习"]
# 空列表表示对所有新闻都感兴趣，AI会根据内容质量评分
interest_keywords = ["AI", "电子硬件", "国内民生", "国际政治"]  # 空列表表示对所有新闻都感兴趣

# 评分维度权重
topic_relevance_weight = 0.4    # 关联度权重（原主题相关性）
importance_weight = 0.4          # 重要程度权重
source_weight = 0.2              # 来源分权重

[server]  # 服务器配置
host = "0.0.0.0"  # 监听地址
port = 8000  # 监听端口
enable_websocket = true  # 是否启用WebSocket

[rag]  # RAG（检索增强生成）配置
top_k = 5  # 检索结果数量
use_fts = true  # 是否使用全文搜索

[logging]  # 日志配置
level = "INFO"  # 日志级别（DEBUG/INFO/WARNING/ERROR）
file = "data/logs/kwafoo.log"  # 日志文件路径
max_size = 10485760  # 最大日志文件大小（字节）
backup_count = 5  # 备份文件数量

[image.thumbnail_size]  # 缩略图尺寸配置
width = 128  # 宽度（像素）
height = 128  # 高度（像素）
default_image = ""  # 默认图片路径
supported_formats = [ "jpg", "jpeg", "png", "webp", "gif",]  # 支持的图片格式

[compression]
# 是否启用文本压缩
enable_compression = true
# 目标token数（默认2000，约5000字符）
target_tokens = 2000
# 压缩级别：balanced（平衡）、aggressive（激进）、conservative（保守）
compression_level = "balanced"
# 压缩算法：auto（自动选择）、default（默认算法）、textrank（textrank4zh算法）
algorithm = "auto"
# 压缩模式：summary（摘要）、keypoints（要点）、qa（问答）
mode = "summary"
max_image_size = 5242880

[report]  # 报告配置
enable_auto_generate = false  # 是否自动生成报告
auto_generate_types = ["daily"]  # 自动生成类型（daily/weekly/monthly）
daily_generate_time = "08:00"  # 每日报告生成时间
weekly_generate_day = "monday"  # 每周报告生成星期
weekly_generate_time = "09:00"  # 每周报告生成时间
monthly_generate_day = 1  # 每月报告生成日期
monthly_generate_time = "10:00"  # 每月报告生成时间
max_news_count = 20  # 报告中包含的最大新闻数
# AI配置
report_ai_model = "google/gemma-4-e4b"  # 报告生成使用的AI模型
report_ai_temperature = 0.7  # 报告生成的温度参数
report_ai_timeout = 300  # 报告生成超时时间（秒）

[content_fetch]  # 正文抓取配置
enable_content_fetch = true  # 是否启用正文抓取
algorithm = "hybrid"  # 提取算法：density, dom, hybrid
min_content_length = 200  # 最小正文长度（字符）
max_content_length = 10000  # 最大正文长度（字符，超过则压缩）
timeout = 30  # 超时时间（秒）
use_proxy = true  # 是否使用代理
enable_cache = true  # 是否缓存已抓取的正文

[image.display]  # 图片显示配置
position = "right"  # 图片位置："right" 或 "left"
show_thumbnail = true  # 是否显示缩略图

