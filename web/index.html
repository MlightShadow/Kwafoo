<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwafoo - 新闻聚合系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📰 Kwafoo 新闻聚合</h1>
            <p class="subtitle">夸父追日，永不止步</p>
        </div>
    </header>

    <div class="top-nav">
        <div class="container">
            <ul class="quick-links">
                <li><a href="#" onclick="window.kwafooApp.showPage('news')">📰 新闻列表</a></li>
                <li><a href="#" onclick="window.kwafooApp.showPage('monitor')">📊 系统监控</a></li>
                <li><a href="#" onclick="window.kwafooApp.showPage('admin')">⚙️ 管理界面</a></li>
                <li>
                <div class="status-section">
                    <div id="systemStatus">
                        <p>系统运行正常</p>
                    </div>
                </div>
                </li>
            </ul>
        </div>
    </div>

    <main class="container">
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>📂 分类</h3>
                <ul class="category-list" id="categoryList">
                    <li class="active" data-category="">全部</li>
                    <li data-category="未分类">未分类</li>
                </ul>
            </div>
        </div>

        <div class="content">
            <div id="newsPage" class="page active">
                <div class="news-header">
                    <h2 id="currentCategory">全部新闻</h2>
                    <div class="news-stats">
                        <span id="newsCount">0 条新闻</span>
                        <span id="lastUpdate">最后更新: -</span>
                    </div>
                </div>
                <div id="newsList" class="news-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div id="monitorPage" class="page" style="display: none;">
                <div class="page-header">
                    <h2>📊 系统监控</h2>
                </div>
                <div id="systemMonitor" class="system-monitor">
                    <div class="monitor-section">
                        <h3>任务进度</h3>
                        <div id="taskProgress"></div>
                    </div>
                    <div class="monitor-section">
                        <h3>系统信息</h3>
                        <div id="systemInfo"></div>
                    </div>
                </div>
            </div>

            <div id="adminPage" class="page" style="display: none;">
                <div class="page-header">
                    <h2>⚙️ 管理界面</h2>
                </div>
                <div id="adminPanel" class="admin-panel">
                    <div class="admin-section">
                        <h3>🔄 快捷操作</h3>
                        <button id="fetchButton" class="action-button">🔄 手动抓取新闻</button>
                        <button id="aiProcessButton" class="action-button">🤖 AI分析新闻</button>
                        <button id="clearNewsButton" class="action-button danger">🗑️ 清空新闻数据</button>
                    </div>
                    <div class="admin-section">
                        <h3>📊 新闻统计</h3>
                        <div id="newsStats">
                            <div class="stat-item">
                                <span class="stat-label">总新闻数：</span>
                                <span class="stat-value" id="totalNews">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">活跃新闻：</span>
                                <span class="stat-value" id="activeNews">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">已删除：</span>
                                <span class="stat-value" id="deletedNews">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">已处理：</span>
                                <span class="stat-value" id="processedNews">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">未处理：</span>
                                <span class="stat-value" id="unprocessedNews">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="admin-section">
                        <h3>📰 新闻源管理</h3>
                        <div id="newsSourcesConfig">
                            <p>新闻源配置功能开发中...</p>
                        </div>
                    </div>
                    <div class="admin-section">
                        <h3>🤖 AI配置</h3>
                        <div id="aiConfig">
                            <p>AI配置功能开发中...</p>
                        </div>
                    </div>
                    <div class="admin-section">
                        <h3>⏰ 调度配置</h3>
                        <div id="schedulerConfig">
                            <p>调度配置功能开发中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="chatModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>💬 AI 对话</h3>
                <span class="close" id="closeChat">&times;</span>
            </div>
            <div class="modal-body">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="输入您的问题...">
                    <button id="sendChat">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div class="fab" id="chatFab">
        💬
    </div>

    <script src="js/app.js"></script>
    <script>
        // 将应用实例暴露到全局，方便HTML中的onclick调用
        window.kwafooApp = window.kwafooApp;
    </script>
</body>
</html>
